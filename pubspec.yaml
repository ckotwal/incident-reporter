
name: incident_reporter
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.1.0
  firebase_auth: ^6.2.0
  google_maps_flutter: ^2.7.0
  geolocator: ^14.0.2
  image_picker: ^1.1.2
  provider: ^6.1.2
  http: ^1.2.1
  random_string: ^2.3.1
  intl: ^0.20.2
  geocoding: ^4.0.0
  geoflutterfire_plus: ^0.0.34
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  firebase_app_check: ^0.4.1+5
  timeago: ^3.6.1
  camera: ^0.12.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11
  flutter_launcher_icons: 0.14.4
  fake_cloud_firestore: ^4.0.2+1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "icon.png"
  image_path_android: "icon.png"
  min_sdk_android: 21
